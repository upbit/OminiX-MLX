# Qwen3-TTS Style Prompt Templates
#
# Tested with speaker+instruct mode (voice + prompt combined).
# Default sampling params (temp=0.9, top_k=50, top_p=1.0, rep_penalty=1.05)
# work best for most styles. Only override params when noted.
#
# Usage (API):
#   { "input": "...", "voice": "serena", "prompt": "<prompt_text>" }
#
# Usage (CLI):
#   --speaker vivian --instruct "<prompt_text>"
#
# Tips:
#   - Include multiple dimensions (emotion + timbre + pace) for stronger control
#   - Keep temperature >= 0.8 to avoid runaway generation (no EOS)
#   - Chinese prompts work best with Chinese speakers (serena, vivian, uncle_fu, dylan)
#   - English prompts work best with English speakers (ryan, aiden)

# ============================================================================
# Verified prompts (tested on vivian, accurate style control)
# ============================================================================

[excited]
zh = "用兴奋激动的语气说话，充满热情和活力"

[sad]
zh = "用悲伤失望的语气说话，声音低沉，语速缓慢"

[cheerful]
zh = "用开朗愉快的语气说话，声音明亮上扬，节奏轻快"

[shout]
zh = "用大声喊叫的方式说话，声音高亢有力，语速快"

[sarcastic]
zh = "用讽刺嘲讽的语气说话，语调阴阳怪气，拖长尾音"

[soft]
zh = "用温柔轻柔的语气说话"

[panic]
# Requires param override: higher temp + rep_penalty for authentic panic
zh = "用惊慌恐惧的语气说话，声音颤抖，语速急促"
temperature = 1.0
repetition_penalty = 1.3

