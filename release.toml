[workspace]
allow-branch = ["main"]
sign-commit = false
sign-tag = false
push = true
publish = false
shared-version = true
tag-prefix = "v"
tag-name = "v{{version}}"
pre-release-commit-message = "release: v{{version}}"
tag-message = "v{{version}}"
pre-release-hook = ["git-cliff", "-o", "CHANGELOG.md", "--tag", "v{{version}}"]

# Crates that do NOT follow the shared workspace version
[[package]]
name = "mlx-sys"
shared-version = false
release = false

[[package]]
name = "ominix-api"
shared-version = false
release = false

[[package]]
name = "mlx-lm-utils"
shared-version = false
release = false

[[package]]
name = "mlx-rs-core"
shared-version = false
release = false
